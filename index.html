<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Phân tích CX Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>📊 PHÂN TÍCH BÁO CÁO KHÁCH HÀNG</h1>
        
        <div class="input-section">
            <div class="row">
                <input type="text" id="pName" placeholder="Tên sản phẩm...">
                <input type="text" id="pCode" placeholder="Mã sản phẩm...">
            </div>
            
            <div class="row">
                <select id="pStars">
                    <option value="5">⭐⭐⭐⭐⭐ (5 Sao)</option>
                    <option value="4">⭐⭐⭐⭐ (4 Sao)</option>
                    <option value="3">⭐⭐⭐ (3 Sao)</option>
                    <option value="2">⭐⭐ (2 Sao)</option>
                    <option value="1">⭐ (1 Sao)</option>
                </select>
                <div class="file-upload">
                    <label for="imageInput">📸 Tải ảnh sản phẩm</label>
                    <input type="file" id="imageInput" accept="image/*">
                </div>
            </div>

            <img id="imagePreview" alt="Xem trước ảnh">
            <textarea id="userInput" placeholder="Dán nội dung khách hàng bình luận vào đây..."></textarea>
            <button id="analyzeBtn">PHÂN TÍCH CHUYÊN SÂU</button>
        </div>

        <div id="result"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
