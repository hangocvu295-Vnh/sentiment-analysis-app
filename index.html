<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CX Insight Analytics</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>📊 CX Insight Analytics</h1>
        <div class="main-layout">
            <div class="left-panel">
                <img id="productImg" src="placeholder.jpg" alt="Sản phẩm">
                <h3 id="pNameDisplay">Tên sản phẩm</h3>
                <p id="pCodeDisplay">Mã: N/A</p>
            </div>
            <div class="right-panel">
                <input type="text" id="pName" placeholder="Tên sản phẩm" oninput="document.getElementById('pNameDisplay').innerText = this.value">
                <input type="text" id="pCode" placeholder="Mã sản phẩm" onblur="loadImg()">
                <textarea id="userInput" rows="6" placeholder="Dán nội dung phản hồi..."></textarea>
                <button id="analyzeBtn">PHÂN TÍCH CHIẾN LƯỢC 🚀</button>
            </div>
        </div>
        <div id="result" class="dashboard"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
