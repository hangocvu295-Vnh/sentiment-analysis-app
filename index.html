<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
<div class="container">
    <div class="main-layout">
        <div class="left-panel">
            <label for="imageUpload"><img id="productImg" src="https://via.placeholder.com/250?text=Chọn+Ảnh" alt="Sản phẩm"></label>
            <input type="file" id="imageUpload" accept="image/*" style="display:none" onchange="document.getElementById('productImg').src=window.URL.createObjectURL(this.files[0])">
            <h3 id="pNameDisplay">Tên sản phẩm</h3>
            <p id="pCodeDisplay">Mã: N/A</p>
        </div>
        <div class="right-panel">
            <input type="text" id="pName" placeholder="Tên sản phẩm" oninput="document.getElementById('pNameDisplay').innerText=this.value">
            <input type="text" id="pCode" placeholder="Mã sản phẩm" oninput="document.getElementById('pCodeDisplay').innerText='Mã: '+this.value">
            <textarea id="userInput" rows="6" placeholder="Dán nội dung phản hồi khách hàng..."></textarea>
            <button id="analyzeBtn"><i class="fas fa-rocket"></i> PHÂN TÍCH</button>
        </div>
    </div>
    <div id="result" class="dashboard"></div>
</div>
<script src="script.js"></script>
</body>
</html>
