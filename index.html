<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>CX Insight Analytics</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🔍 Phân tích Phản hồi</h1>
        
        <input type="password" id="apiKey" placeholder="Dán Groq API Key của bạn vào đây...">
        
        <div class="grid-2">
            <input type="text" id="pName" placeholder="Tên sản phẩm">
            <input type="text" id="pCode" placeholder="Mã sản phẩm">
        </div>
        
        <textarea id="userInput" rows="5" placeholder="Dán nội dung phản hồi khách hàng..."></textarea>
        
        <button id="analyzeBtn">PHÂN TÍCH CHIẾN LƯỢC 🚀</button>
        <div id="result"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
