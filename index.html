<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>CX Insight Analytics</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>📊 CX Insight Analytics</h1>
        <div class="main-layout">
            <div class="left-panel">
                <label for="imageUpload"><img id="productImg" src="https://via.placeholder.com/250?text=Chọn+Ảnh" alt="Sản phẩm"></label>
                <input type="file" id="imageUpload" accept="image/*" style="display:none" onchange="document.getElementById('productImg').src=window.URL.createObjectURL(this.files[0])">
                <h3 id="pNameDisplay">Tên sản phẩm</h3>
                <p id="pCodeDisplay">Mã: N/A</p>
            </div>
            <div class="right-panel">
                <input type="text" id="pName" placeholder="Tên sản phẩm" oninput="document.getElementById('pNameDisplay').innerText=this.value || 'Tên sản phẩm'">
                <input type="text" id="pCode" placeholder="Mã sản phẩm" oninput="document.getElementById('pCodeDisplay').innerText='Mã: '+(this.value || 'N/A')">
                <textarea id="userInput" rows="6" placeholder="Dán nội dung phản hồi khách hàng..."></textarea>
                <button id="analyzeBtn">PHÂN TÍCH CHIẾN LƯỢC 🚀</button>
            </div>
        </div>
        <div id="result" class="dashboard"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
